<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio | Vive Fit</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

 
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>

<body>

<button onclick="aumentarTexto()" class="modo-btn" style="top: 70px;">
A+
</button>

<button onclick="disminuirTexto()" class="modo-btn" style="top: 120px;">
A-
</button>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Vive Fit</a>

    <form class="d-flex ms-auto me-3" role="search" onsubmit="return false;">
      <input id="buscador" class="form-control me-2" type="search" placeholder="Buscar..." aria-label="Buscar">
      <button class="btn btn-light" type="button" onclick="buscar()">Buscar</button>
    </form>

    <div>
      <a href="Log/login.html" class="btn btn-light btn-sm me-2">Iniciar Sesión</a>
    </div>
  </div>
</nav>

<header class="bienvenida-header">
  <h1>Camino a mejorar tu salud</h1>
  <p>Explora rutinas, alimentación y consejos fitness</p>
</header>

<main class="bienvenida-main">

  <div id="resultados" class="row g-4"></div>

  <h2 class="text-center mb-5">Explora nuestras secciones</h2>

  <div class="row text-center g-4">

    <div class="col-md-4">
      <a href="rutinas.html" class="text-decoration-none text-dark">
        <div class="imagen-bienvenida">
          <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" alt="Rutinas de ejercicio">
        </div>
        <h5 class="categoria-titulo">Rutinas</h5>
      </a>
    </div>

    <div class="col-md-4">
      <a href="alimentacion.html" class="text-decoration-none text-dark">
        <div class="imagen-bienvenida">
          <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061" alt="Alimentación saludable">
        </div>
        <h5 class="categoria-titulo">Alimentación</h5>
      </a>
    </div>

    <div class="col-md-4">
      <a href="consejos.html" class="text-decoration-none text-dark">
        <div class="imagen-bienvenida">
          <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438" alt="Consejos fitness">
        </div>
        <h5 class="categoria-titulo">Consejos</h5>
      </a>
    </div>

  </div>

</main>

<footer>
  <p>© 2026 Vive Fit</p>
</footer>

<script>
let datos = [];

fetch('data.json')
  .then(response => response.json())
  .then(data => datos = data);

function buscar() {
  const termino = document.getElementById('buscador').value.toLowerCase().trim();
  const resultados = document.getElementById('resultados');
  resultados.innerHTML = '';

  if (!termino) return;

  const filtrados = datos.filter(item =>
    item.titulo.toLowerCase().includes(termino) ||
    item.descripcion.toLowerCase().includes(termino)
  );

  filtrados.forEach(item => {
    resultados.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3 shadow-sm">
          <h5>${item.titulo}</h5>
          <p>${item.descripcion}</p>
          <a href="${item.link}" class="btn btn-success btn-sm">Ver más</a>
        </div>
      </div>
    `;
  });

  if (filtrados.length === 0) {
    resultados.innerHTML = '<p class="text-center">No se encontraron resultados</p>';
  }
}

let tamañoTexto = 100;

function aumentarTexto(){
  tamañoTexto += 10;
  document.body.style.fontSize = tamañoTexto + "%";
}

function disminuirTexto(){
  tamañoTexto -= 10;
  document.body.style.fontSize = tamañoTexto + "%";
}

</script>

</body>
</html>
