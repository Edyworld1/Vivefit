<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Vive Fit</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">

  <style>
    /* AJUSTE DE LA FRANJA VERDE */
    .bienvenida-header {
      padding: 20px 0 !important; /* Esto reduce la altura de la franja */
      min-height: auto !important; /* Quita alturas mínimas heredadas */
    }
    .bienvenida-header h1 {
      font-size: 1.8rem !important; /* Ajusta el tamaño del título */
      margin: 0;
    }
    .bienvenida-header p {
      margin: 5px 0 0 0; /* Espacio mínimo para el subtítulo */
      font-size: 1rem;
    }

    /* Ajuste para que el formulario se vea bien centrado */
    .contenedor-registro {
      max-width: 500px;
      margin: 40px auto;
      padding: 25px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .btn-registro {
      background-color: #5C7A4D;
      color: white;
      font-weight: bold;
    }
    .btn-registro:hover {
      background-color: #4a633e;
      color: white;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="../bienvenido.html">Vive Fit</a>
    <div class="ms-auto">
      <a href="login.html" class="btn btn-light btn-sm">Ya tengo cuenta</a>
    </div>
  </div>
</nav>

<header class="bienvenida-header">
  <h1>Únete a Vive Fit</h1>
  <p>Crea tu cuenta segura y empieza tu cambio hoy</p>
</header>

<main class="container">
  <div class="contenedor-registro">
    <h3 class="text-center mb-4">Registro de Usuario</h3>
    
    <form onsubmit="return registrarUsuario(event)">
      <div class="mb-3">
        <label class="form-label fw-bold">Nombre completo</label>
        <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required minlength="3">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Correo electrónico</label>
        <input type="email" id="correo" class="form-control" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required minlength="8">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Confirmar contraseña</label>
        <input type="password" id="confirmar" class="form-control" placeholder="Repite tu contraseña" required>
      </div>

      <div class="alert alert-success py-2 small">
        ✔ Registro protegido con Blockchain y Firma Digital.
      </div>

      <button type="submit" class="btn btn-registro w-100 py-2">
        Crear Cuenta
      </button>
    </form>
  </div>
</main>

<footer>
  <p>© 2026 Vive Fit</p>
</footer>

<script>
    // --- LÓGICA DE SEGURIDAD (BLOCKCHAIN) ---
    class Bloque {
      constructor(index, timestamp, datos, hashAnterior = '') {
        this.index = index;
        this.timestamp = timestamp;
        this.datos = datos;
        this.hashAnterior = hashAnterior;
        this.hash = '';
      }
    }

    class BlockchainCocina {
      constructor() { this.cadena = [this.crearBloqueGenesis()]; }
      crearBloqueGenesis() {
        const genesis = new Bloque(0, new Date().toISOString(), "Génesis", "0");
        genesis.hash = "0000_GENESIS";
        return genesis;
      }
      async agregarBloque(nuevoBloque) {
        const ultimo = this.cadena[this.cadena.length - 1];
        nuevoBloque.hashAnterior = ultimo.hash;
        nuevoBloque.hash = await sha256(nuevoBloque.index + nuevoBloque.hashAnterior + JSON.stringify(nuevoBloque.datos));
        this.cadena.push(nuevoBloque);
        console.log("🔗 Blockchain actualizado:", nuevoBloque);
      }
    }

    const miBlockchain = new BlockchainCocina();

    async function sha256(texto) {
      const encoder = new TextEncoder();
      const data = encoder.encode(texto);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    // --- FUNCIÓN DE REGISTRO ---
    async function registrarUsuario(event) {
      event.preventDefault();
      const nombre = document.getElementById("nombre").value;
      const email = document.getElementById("correo").value;
      const password = document.getElementById("password").value;
      const confirmar = document.getElementById("confirmar").value;

      if (password !== confirmar) {
        alert("Las contraseñas no coinciden");
        return false;
      }

      try {
        await miBlockchain.agregarBloque(new Bloque(miBlockchain.cadena.length, new Date().toISOString(), { usuario: nombre, correo: email }));

        const respuesta = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });

        const resultado = await respuesta.json();

        if (respuesta.ok) {
          alert("✔ Registro Exitoso.\n\nDatos guardados en MongoDB y Blockchain.");
          window.location.href = "login.html";
        } else {
          alert("Error: " + resultado.error);
        }
      } catch (error) {
        alert("Error de conexión. Asegúrate de que 'node server.js' esté corriendo.");
      }
    }
</script>

</body>
</html>
